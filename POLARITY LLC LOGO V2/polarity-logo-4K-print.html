<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>POLARITY LLC - 4K Logo for PDF Print (CLEAN)</title>
  <style>
    @page {
      size: 3840px 2160px;
      margin: 0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 3840px;
      height: 2160px;
      overflow: hidden;
    }
    body {
      background: #F5F5F7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 80px;
    }
    .logo {
      width: 2200px;
      height: auto;
    }
    .tagline {
      text-align: center;
    }
    .tagline-main {
      font-size: 48px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .tagline-sub {
      font-size: 32px;
      color: #666;
      letter-spacing: 0.15em;
      margin-bottom: 40px;
    }
    .location {
      font-size: 22px;
      color: #999;
      letter-spacing: 0.35em;
    }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg class="logo" viewBox="0 0 1000 140">
      <defs>
        <radialGradient id="nodeGrad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="40%" stop-color="#FF8899"/>
          <stop offset="100%" stop-color="#CC2244"/>
        </radialGradient>
        <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FF6680"/>
          <stop offset="50%" stop-color="#FF4466"/>
          <stop offset="100%" stop-color="#CC2244"/>
        </linearGradient>
        <radialGradient id="pNodeGrad" cx="30%" cy="25%" r="75%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="15%" stop-color="#FFD8DD"/>
          <stop offset="35%" stop-color="#FF8899"/>
          <stop offset="55%" stop-color="#FF4466"/>
          <stop offset="75%" stop-color="#CC2244"/>
          <stop offset="100%" stop-color="#881133"/>
        </radialGradient>
        <radialGradient id="sphereGrad" cx="30%" cy="25%" r="75%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="15%" stop-color="#FFD8DD"/>
          <stop offset="35%" stop-color="#FF8899"/>
          <stop offset="55%" stop-color="#FF4466"/>
          <stop offset="75%" stop-color="#CC2244"/>
          <stop offset="100%" stop-color="#881133"/>
        </radialGradient>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#FF4466" stop-opacity="0.2"/>
          <stop offset="50%" stop-color="#FFAABB"/>
          <stop offset="100%" stop-color="#FF4466" stop-opacity="0.2"/>
        </linearGradient>
        <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FF4466" stop-opacity="0"/>
          <stop offset="30%" stop-color="#FF4466" stop-opacity="0.4"/>
          <stop offset="50%" stop-color="#FF4466" stop-opacity="0.8"/>
          <stop offset="70%" stop-color="#FF4466" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#FF4466" stop-opacity="0"/>
        </linearGradient>
        <radialGradient id="tealNodeGrad" cx="30%" cy="25%" r="75%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="15%" stop-color="#B8E8E8"/>
          <stop offset="35%" stop-color="#66CCCC"/>
          <stop offset="55%" stop-color="#20B2AA"/>
          <stop offset="75%" stop-color="#008B8B"/>
          <stop offset="100%" stop-color="#005555"/>
        </radialGradient>
      </defs>
      <!-- P - Enhanced -->
      <g transform="translate(10, 20)">
        <path d="M 18 100 L 18 8 L 52 8 C 82 8, 82 54, 52 54 L 18 54" stroke="url(#pGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="18" cy="100" r="8" fill="url(#pNodeGrad)"/><ellipse cx="14" cy="96" rx="3" ry="2.5" fill="white" opacity="0.35"/><circle cx="13" cy="95" r="1.5" fill="white" opacity="0.55"/>
        <circle cx="18" cy="8" r="8" fill="url(#pNodeGrad)"/><ellipse cx="14" cy="4" rx="3" ry="2.5" fill="white" opacity="0.35"/><circle cx="13" cy="3" r="1.5" fill="white" opacity="0.55"/>
        <circle cx="70" cy="31" r="7" fill="url(#pNodeGrad)"/><ellipse cx="66" cy="27" rx="2.5" ry="2" fill="white" opacity="0.35"/><circle cx="65" cy="26" r="1.2" fill="white" opacity="0.55"/>
      </g>
      <!-- O -->
      <g transform="translate(95, 20)"><rect x="49" y="-10" width="6" height="30" rx="3" fill="url(#beamGrad)"/><rect x="49" y="88" width="6" height="30" rx="3" fill="url(#beamGrad)"/><ellipse cx="52" cy="54" rx="46" ry="13" transform="rotate(-20 52 54)" stroke="url(#ringGrad)" stroke-width="2.5" fill="none"/><ellipse cx="52" cy="54" rx="42" ry="11" transform="rotate(25 52 54)" stroke="url(#ringGrad)" stroke-width="1.5" fill="none" opacity="0.6"/><circle cx="52" cy="54" r="32" fill="url(#sphereGrad)"/><ellipse cx="42" cy="44" rx="9" ry="7" fill="white" opacity="0.35"/><circle cx="38" cy="40" r="4" fill="white" opacity="0.55"/></g>
      <!-- L -->
      <g transform="translate(205, 20)"><path d="M 18 8 L 18 100 L 72 100" stroke="#FF4466" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="18" cy="8" r="6" fill="url(#nodeGrad)"/><circle cx="18" cy="100" r="6" fill="url(#nodeGrad)"/><circle cx="72" cy="100" r="6" fill="url(#nodeGrad)"/></g>
      <!-- A -->
      <g transform="translate(290, 20)"><path d="M 8 100 L 45 8 L 82 100 M 20 68 L 70 68" stroke="#FF4466" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="8" cy="100" r="6" fill="url(#nodeGrad)"/><circle cx="45" cy="8" r="7" fill="url(#nodeGrad)"/><circle cx="82" cy="100" r="6" fill="url(#nodeGrad)"/></g>
      <!-- R -->
      <g transform="translate(385, 20)"><path d="M 18 100 L 18 8 L 52 8 C 82 8, 82 52, 52 52 L 18 52 M 46 52 L 78 100" stroke="#FF4466" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="18" cy="8" r="6" fill="url(#nodeGrad)"/><circle cx="18" cy="100" r="6" fill="url(#nodeGrad)"/><circle cx="70" cy="30" r="5" fill="url(#nodeGrad)"/><circle cx="78" cy="100" r="6" fill="url(#nodeGrad)"/></g>
      <!-- I -->
      <g transform="translate(480, 20)"><path d="M 20 8 L 60 8 M 40 8 L 40 100 M 20 100 L 60 100" stroke="#FF4466" stroke-width="6" stroke-linecap="round" fill="none"/><circle cx="20" cy="8" r="5" fill="url(#nodeGrad)"/><circle cx="60" cy="8" r="5" fill="url(#nodeGrad)"/><circle cx="40" cy="8" r="6" fill="url(#nodeGrad)"/><circle cx="40" cy="100" r="6" fill="url(#nodeGrad)"/><circle cx="20" cy="100" r="5" fill="url(#nodeGrad)"/><circle cx="60" cy="100" r="5" fill="url(#nodeGrad)"/></g>
      <!-- T -->
      <g transform="translate(560, 20)"><path d="M 8 8 L 72 8 M 40 8 L 40 100" stroke="#FF4466" stroke-width="6" stroke-linecap="round" fill="none"/><circle cx="8" cy="8" r="6" fill="url(#nodeGrad)"/><circle cx="72" cy="8" r="6" fill="url(#nodeGrad)"/><circle cx="40" cy="8" r="6" fill="url(#nodeGrad)"/><circle cx="40" cy="100" r="6" fill="url(#nodeGrad)"/></g>
      <!-- Y -->
      <g transform="translate(650, 20)"><path d="M 8 8 L 42 54 L 76 8 M 42 54 L 42 100" stroke="#FF4466" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="8" cy="8" r="6" fill="url(#nodeGrad)"/><circle cx="76" cy="8" r="6" fill="url(#nodeGrad)"/><circle cx="42" cy="54" r="6" fill="url(#nodeGrad)"/><circle cx="42" cy="100" r="6" fill="url(#nodeGrad)"/></g>
      <!-- LLC - TEAL -->
      <g transform="translate(755, 20)"><path d="M 18 8 L 18 100 L 62 100" stroke="#20B2AA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="18" cy="8" r="6" fill="url(#tealNodeGrad)"/><ellipse cx="14" cy="4" rx="2" ry="1.5" fill="white" opacity="0.35"/><circle cx="18" cy="100" r="6" fill="url(#tealNodeGrad)"/><ellipse cx="14" cy="96" rx="2" ry="1.5" fill="white" opacity="0.35"/><circle cx="62" cy="100" r="6" fill="url(#tealNodeGrad)"/><ellipse cx="58" cy="96" rx="2" ry="1.5" fill="white" opacity="0.35"/></g>
      <g transform="translate(830, 20)"><path d="M 18 8 L 18 100 L 62 100" stroke="#20B2AA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="18" cy="8" r="6" fill="url(#tealNodeGrad)"/><ellipse cx="14" cy="4" rx="2" ry="1.5" fill="white" opacity="0.35"/><circle cx="18" cy="100" r="6" fill="url(#tealNodeGrad)"/><ellipse cx="14" cy="96" rx="2" ry="1.5" fill="white" opacity="0.35"/><circle cx="62" cy="100" r="6" fill="url(#tealNodeGrad)"/><ellipse cx="58" cy="96" rx="2" ry="1.5" fill="white" opacity="0.35"/></g>
      <g transform="translate(905, 20)"><path d="M 62 20 C 30 8, 8 30, 8 54 C 8 78, 30 100, 62 88" stroke="#20B2AA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="62" cy="20" r="6" fill="url(#tealNodeGrad)"/><ellipse cx="58" cy="16" rx="2" ry="1.5" fill="white" opacity="0.35"/><circle cx="62" cy="88" r="6" fill="url(#tealNodeGrad)"/><ellipse cx="58" cy="84" rx="2" ry="1.5" fill="white" opacity="0.35"/></g>
    </svg>
    <div class="tagline">
      <div class="tagline-main">Research Lab</div>
      <div class="tagline-sub">Conversational Connectomics</div>
      <div class="location">PROVIDENCE, RI</div>
    </div>
  </div>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <!-- Deep cosmic background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="40%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>

    <!-- Atmospheric teal glow behind logo -->
    <radialGradient id="atmosphereGlow" cx="22%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#4ECDC4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>

    <!-- Secondary coral glow -->
    <radialGradient id="coralGlow" cx="70%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#FFA07A" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#FFA07A" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FFA07A" stop-opacity="0"/>
    </radialGradient>

    <!-- Purple accent glow -->
    <radialGradient id="purpleGlow" cx="85%" cy="30%" r="25%">
      <stop offset="0%" stop-color="#BB8FCE" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#BB8FCE" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#BB8FCE" stop-opacity="0"/>
    </radialGradient>

    <!-- Core gradient (teal) -->
    <radialGradient id="coreGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6EE7DF"/>
      <stop offset="50%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#2BA89F"/>
    </radialGradient>

    <!-- Teal ambient glow -->
    <radialGradient id="tealAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid line gradient -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4ECDC4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Horizontal grid fade -->
    <linearGradient id="hGridGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4ECDC4" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#4ECDC4" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#4ECDC4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8EC"/>
    </linearGradient>

    <!-- Glow filter for particles -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Orbital glow -->
    <filter id="orbitalGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Core intense glow -->
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star pattern -->
    <pattern id="stars" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="30" r="0.8" fill="#ffffff" opacity="0.4"/>
      <circle cx="85" cy="12" r="0.5" fill="#ffffff" opacity="0.3"/>
      <circle cx="150" cy="55" r="0.6" fill="#4ECDC4" opacity="0.35"/>
      <circle cx="45" cy="90" r="0.4" fill="#ffffff" opacity="0.25"/>
      <circle cx="120" cy="140" r="0.7" fill="#ffffff" opacity="0.4"/>
      <circle cx="180" cy="95" r="0.5" fill="#FFA07A" opacity="0.3"/>
      <circle cx="30" cy="160" r="0.6" fill="#ffffff" opacity="0.35"/>
      <circle cx="95" cy="180" r="0.4" fill="#BB8FCE" opacity="0.25"/>
      <circle cx="160" cy="170" r="0.8" fill="#ffffff" opacity="0.4"/>
      <circle cx="70" cy="65" r="0.3" fill="#4ECDC4" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgGrad)"/>

  <!-- Stars layer -->
  <rect width="1584" height="396" fill="url(#stars)" opacity="0.6"/>

  <!-- Atmospheric glows -->
  <rect width="1584" height="396" fill="url(#atmosphereGlow)"/>
  <rect width="1584" height="396" fill="url(#coralGlow)"/>
  <rect width="1584" height="396" fill="url(#purpleGlow)"/>

  <!-- Perspective grid floor -->
  <g opacity="0.35">
    <!-- Vertical grid lines with perspective -->
    <line x1="792" y1="220" x2="792" y2="396" stroke="url(#gridGrad)" stroke-width="1"/>
    <line x1="692" y1="240" x2="592" y2="396" stroke="url(#gridGrad)" stroke-width="0.8"/>
    <line x1="892" y1="240" x2="992" y2="396" stroke="url(#gridGrad)" stroke-width="0.8"/>
    <line x1="592" y1="260" x2="392" y2="396" stroke="url(#gridGrad)" stroke-width="0.6"/>
    <line x1="992" y1="260" x2="1192" y2="396" stroke="url(#gridGrad)" stroke-width="0.6"/>
    <line x1="492" y1="280" x2="192" y2="396" stroke="url(#gridGrad)" stroke-width="0.4"/>
    <line x1="1092" y1="280" x2="1392" y2="396" stroke="url(#gridGrad)" stroke-width="0.4"/>

    <!-- Horizontal grid lines -->
    <line x1="0" y1="310" x2="1584" y2="310" stroke="url(#hGridGrad)" stroke-width="0.5"/>
    <line x1="0" y1="345" x2="1584" y2="345" stroke="url(#hGridGrad)" stroke-width="0.6"/>
    <line x1="0" y1="375" x2="1584" y2="375" stroke="url(#hGridGrad)" stroke-width="0.7"/>
  </g>

  <!-- POLARITY Atom Logo -->
  <g transform="translate(200, 198)">
    <!-- Subtle ambient glow -->
    <circle cx="50" cy="0" r="100" fill="url(#tealAmbient)" opacity="0.4"/>

    <!-- Orbital 1 - Teal (tilted -60deg) -->
    <ellipse
      cx="50" cy="0"
      rx="85" ry="27"
      fill="none"
      stroke="#4ECDC4"
      stroke-width="2"
      transform="rotate(-60 50 0)"
      filter="url(#orbitalGlow)"
      opacity="0.9"
    />

    <!-- Orbital 2 - Coral (tilted 60deg) -->
    <ellipse
      cx="50" cy="0"
      rx="85" ry="27"
      fill="none"
      stroke="#FFA07A"
      stroke-width="2"
      transform="rotate(60 50 0)"
      filter="url(#orbitalGlow)"
      opacity="0.9"
    />

    <!-- Orbital 3 - Purple (horizontal) -->
    <ellipse
      cx="50" cy="0"
      rx="85" ry="27"
      fill="none"
      stroke="#BB8FCE"
      stroke-width="2"
      filter="url(#orbitalGlow)"
      opacity="0.9"
    />

    <!-- Electron on teal orbital -->
    <circle cx="92" cy="-72" r="6" fill="#4ECDC4" filter="url(#glow)"/>

    <!-- Electron on coral orbital -->
    <circle cx="8" cy="-72" r="6" fill="#FFA07A" filter="url(#glow)"/>

    <!-- Electron on purple orbital -->
    <circle cx="135" cy="0" r="6" fill="#BB8FCE" filter="url(#glow)"/>

    <!-- Central nucleus / core -->
    <circle cx="50" cy="0" r="28" fill="url(#coreGrad)" filter="url(#coreGlow)"/>

    <!-- Core highlight -->
    <circle cx="42" cy="-8" r="10" fill="white" opacity="0.25"/>

    <!-- Inner core accent -->
    <circle cx="50" cy="0" r="12" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- POLARITY Text -->
  <g transform="translate(380, 155)">
    <text x="0" y="50" font-family="'Syne', 'SF Pro Display', -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="8" fill="url(#textGrad)">POLARITY</text>
    <text x="0" y="100" font-family="'DM Sans', 'SF Pro Text', -apple-system, sans-serif" font-size="28" font-weight="400" letter-spacing="12" fill="#888899">LAB</text>
  </g>

  <!-- Tagline -->
  <text x="380" y="280" font-family="'Space Mono', 'SF Mono', monospace" font-size="14" letter-spacing="2" fill="#4ECDC4" opacity="0.9">MAPPING COGNITION · BUILDING CCX</text>

  <!-- Decorative floating particles -->
  <circle cx="1350" cy="80" r="3" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="1420" cy="150" r="2" fill="#FFA07A" opacity="0.4"/>
  <circle cx="1300" cy="200" r="1.5" fill="#BB8FCE" opacity="0.35"/>
  <circle cx="1480" cy="100" r="2.5" fill="#4ECDC4" opacity="0.4"/>
  <circle cx="1380" cy="250" r="2" fill="#FFA07A" opacity="0.35"/>
  <circle cx="1520" cy="180" r="1.8" fill="#BB8FCE" opacity="0.3"/>

  <!-- Accent lines -->
  <line x1="380" y1="118" x2="520" y2="118" stroke="#4ECDC4" stroke-width="2" opacity="0.6"/>
  <line x1="380" y1="300" x2="680" y2="300" stroke="#4ECDC4" stroke-width="1" opacity="0.3"/>

  <!-- Corner accents -->
  <path d="M1534 0 L1584 0 L1584 50" fill="none" stroke="#4ECDC4" stroke-width="2" opacity="0.4"/>
  <path d="M0 346 L0 396 L50 396" fill="none" stroke="#FFA07A" stroke-width="2" opacity="0.3"/>
</svg>
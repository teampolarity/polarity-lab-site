<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 140" width="820" height="140">
  <defs>
    <!-- Node gradient for connection points -->
    <radialGradient id="nodeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#FF8899"/>
      <stop offset="100%" stop-color="#CC2244"/>
    </radialGradient>
    
    <!-- Main sphere gradient - ultra realistic -->
    <radialGradient id="sphereGrad" cx="32%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="15%" stop-color="#FFE5E8"/>
      <stop offset="30%" stop-color="#FFB0BB"/>
      <stop offset="50%" stop-color="#FF4466"/>
      <stop offset="75%" stop-color="#CC2244"/>
      <stop offset="90%" stop-color="#991133"/>
      <stop offset="100%" stop-color="#771122"/>
    </radialGradient>
    
    <!-- Orbital ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4466" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#FFD0DD"/>
      <stop offset="100%" stop-color="#FF4466" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Polar beam gradient -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FF8899" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FF4466" stop-opacity="1"/>
      <stop offset="70%" stop-color="#FF8899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="letterGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="sphereGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="beamGlow" x="-100%" y="-50%" width="300%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- P -->
  <g transform="translate(10, 20)">
    <path d="M 18 100 L 18 8 L 52 8 C 82 8, 82 54, 52 54 L 18 54" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/>
    <circle cx="18" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="18" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="70" cy="31" r="4.5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
  </g>

  <!-- O - THE ICONIC SPHERE -->
  <g transform="translate(95, 20)">
    <!-- Polar beam top -->
    <rect x="48" y="-12" width="8" height="35" rx="4" fill="url(#beamGrad)" filter="url(#beamGlow)"/>
    <!-- Polar beam bottom -->
    <rect x="48" y="85" width="8" height="35" rx="4" fill="url(#beamGrad)" filter="url(#beamGlow)"/>
    <!-- Orbital ring 1 -->
    <ellipse cx="52" cy="54" rx="48" ry="14" transform="rotate(-20 52 54)" stroke="url(#ringGrad)" stroke-width="3" fill="none" filter="url(#letterGlow)"/>
    <!-- Orbital ring 2 -->
    <ellipse cx="52" cy="54" rx="44" ry="12" transform="rotate(25 52 54)" stroke="url(#ringGrad)" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#letterGlow)"/>
    <!-- Main sphere -->
    <circle cx="52" cy="54" r="32" fill="url(#sphereGrad)" filter="url(#sphereGlow)"/>
    <!-- Highlight 1 -->
    <circle cx="40" cy="42" r="10" fill="white" opacity="0.3"/>
    <!-- Highlight 2 -->
    <circle cx="36" cy="38" r="4" fill="white" opacity="0.5"/>
  </g>

  <!-- L -->
  <g transform="translate(205, 20)">
    <path d="M 18 8 L 18 100 L 72 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/>
    <circle cx="18" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="18" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="72" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
  </g>

  <!-- A -->
  <g transform="translate(290, 20)">
    <path d="M 8 100 L 45 8 L 82 100 M 20 68 L 70 68" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/>
    <circle cx="8" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="45" cy="8" r="6" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="82" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
  </g>

  <!-- R -->
  <g transform="translate(385, 20)">
    <path d="M 18 100 L 18 8 L 52 8 C 82 8, 82 52, 52 52 L 18 52 M 46 52 L 78 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/>
    <circle cx="18" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="18" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="70" cy="30" r="4.5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="78" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
  </g>

  <!-- I -->
  <g transform="translate(480, 20)">
    <path d="M 20 8 L 60 8 M 40 8 L 40 100 M 20 100 L 60 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" fill="none" filter="url(#letterGlow)"/>
    <circle cx="20" cy="8" r="4" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="60" cy="8" r="4" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="40" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="40" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="20" cy="100" r="4" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="60" cy="100" r="4" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
  </g>

  <!-- T -->
  <g transform="translate(560, 20)">
    <path d="M 8 8 L 72 8 M 40 8 L 40 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" fill="none" filter="url(#letterGlow)"/>
    <circle cx="8" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="72" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="40" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="40" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
  </g>

  <!-- Y -->
  <g transform="translate(650, 20)">
    <path d="M 8 8 L 42 54 L 76 8 M 42 54 L 42 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/>
    <circle cx="8" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="76" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="42" cy="54" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
    <circle cx="42" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>
  </g>
</svg>

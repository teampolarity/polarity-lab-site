<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Polarity App Icon - 400x400</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @page { size: 400px 400px; margin: 0; }
    body { 
      width: 400px; 
      height: 400px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: white;
      overflow: hidden;
    }
    svg { width: 360px; height: 360px; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="360" height="360">
    <defs>
      <!-- Main sphere gradient - 3D metallic teal -->
      <radialGradient id="sphereGradApp" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="#7EEEE6"/>
        <stop offset="15%" stop-color="#4EDDD4"/>
        <stop offset="35%" stop-color="#20B2AA"/>
        <stop offset="55%" stop-color="#009B99"/>
        <stop offset="75%" stop-color="#007777"/>
        <stop offset="100%" stop-color="#005555"/>
      </radialGradient>
      
      <!-- Teal ring gradient -->
      <linearGradient id="ringGradTeal" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#20B2AA" stop-opacity="0.3"/>
        <stop offset="50%" stop-color="#4EDDD4"/>
        <stop offset="100%" stop-color="#20B2AA" stop-opacity="0.3"/>
      </linearGradient>
      
      <!-- Orange/coral ring gradient -->
      <linearGradient id="ringGradOrange" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FF9966" stop-opacity="0.3"/>
        <stop offset="50%" stop-color="#FFB399"/>
        <stop offset="100%" stop-color="#FF9966" stop-opacity="0.3"/>
      </linearGradient>
      
      <!-- Node gradients -->
      <radialGradient id="nodeTeal" cx="40%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#7EEEE6"/>
        <stop offset="50%" stop-color="#20B2AA"/>
        <stop offset="100%" stop-color="#009B99"/>
      </radialGradient>
      
      <radialGradient id="nodeOrange" cx="40%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#FFB399"/>
        <stop offset="50%" stop-color="#FF9966"/>
        <stop offset="100%" stop-color="#FF7744"/>
      </radialGradient>
      
      <filter id="glowApp" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      
      <filter id="sphereGlowApp" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    
    <!-- Orbital ring 1 (Teal) - top-left to bottom-right -->
    <ellipse cx="100" cy="100" rx="68" ry="20" transform="rotate(-25 100 100)" 
             stroke="url(#ringGradTeal)" stroke-width="3.5" fill="none" filter="url(#glowApp)"/>
    <circle cx="148" cy="65" r="5" fill="url(#nodeTeal)" filter="url(#glowApp)"/>
    
    <!-- Orbital ring 2 (Orange) - top-right to bottom-left -->
    <ellipse cx="100" cy="100" rx="68" ry="20" transform="rotate(25 100 100)" 
             stroke="url(#ringGradOrange)" stroke-width="3.5" fill="none" filter="url(#glowApp)"/>
    <circle cx="52" cy="65" r="5" fill="url(#nodeOrange)" filter="url(#glowApp)"/>
    
    <!-- Orbital ring 3 (Teal) - nearly horizontal -->
    <ellipse cx="100" cy="100" rx="68" ry="20" transform="rotate(75 100 100)" 
             stroke="url(#ringGradTeal)" stroke-width="3.5" fill="none" filter="url(#glowApp)"/>
    <circle cx="100" cy="32" r="5" fill="url(#nodeTeal)" filter="url(#glowApp)"/>
    
    <!-- Main sphere -->
    <circle cx="100" cy="100" r="48" fill="url(#sphereGradApp)" filter="url(#sphereGlowApp)"/>
    
    <!-- Highlight 1 (large) -->
    <ellipse cx="80" cy="80" rx="16" ry="12" fill="white" opacity="0.4"/>
    
    <!-- Highlight 2 (small bright) -->
    <circle cx="73" cy="73" r="7" fill="white" opacity="0.6"/>
    
    <!-- Secondary highlight -->
    <ellipse cx="112" cy="92" rx="10" ry="7" fill="white" opacity="0.25"/>
  </svg>
</body>
</html>

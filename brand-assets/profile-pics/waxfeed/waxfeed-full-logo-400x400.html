<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waxfeed Full Logo - 400x400</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @page { size: 400px 400px; margin: 0; }
    body { 
      width: 400px; 
      height: 400px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: #f5f5f5;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <defs>
      <!-- EXTREMELY SUBTLE pastel holographic - barely visible color shifts -->
      <radialGradient id="holoDisc" cx="28%" cy="28%" r="72%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="18%" stop-color="#fff5fb"/>
        <stop offset="30%" stop-color="#fff0f8"/>
        <stop offset="45%" stop-color="#f0fff5"/>
        <stop offset="60%" stop-color="#f0f8ff"/>
        <stop offset="75%" stop-color="#f8f0ff"/>
        <stop offset="90%" stop-color="#fff0f8"/>
        <stop offset="100%" stop-color="#faf5ff"/>
      </radialGradient>
      
      <!-- Center hub gradient - gray metallic -->
      <radialGradient id="hub" cx="38%" cy="32%" r="65%">
        <stop offset="0%" stop-color="#d8d8d8"/>
        <stop offset="35%" stop-color="#b0b0b0"/>
        <stop offset="65%" stop-color="#888888"/>
        <stop offset="100%" stop-color="#606060"/>
      </radialGradient>
      
      <!-- Very soft shadow -->
      <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
        <feOffset dx="0" dy="2" result="offsetblur"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.15"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    
    <!-- Light gray container background -->
    <rect x="0" y="0" width="400" height="400" fill="#e5e5e5" rx="6"/>
    
    <!-- Inner frame -->
    <rect x="15" y="15" width="370" height="370" fill="#ebebeb" rx="4"/>
    
    <!-- Vinyl Disc -->
    <g transform="translate(200, 200)" filter="url(#shadow)">
      <!-- Main EXTREMELY SUBTLE holographic disc surface -->
      <circle cx="0" cy="0" r="162" fill="url(#holoDisc)"/>
      
      <!-- Barely visible grooves -->
      <circle cx="0" cy="0" r="155" fill="none" stroke="rgba(0,0,0,0.015)" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="142" fill="none" stroke="rgba(0,0,0,0.015)" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="128" fill="none" stroke="rgba(0,0,0,0.015)" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="114" fill="none" stroke="rgba(0,0,0,0.015)" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="100" fill="none" stroke="rgba(0,0,0,0.015)" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="86" fill="none" stroke="rgba(0,0,0,0.015)" stroke-width="0.3"/>
      
      <!-- Center hub -->
      <circle cx="0" cy="0" r="48" fill="url(#hub)"/>
      <circle cx="0" cy="0" r="40" fill="#989898"/>
      <circle cx="0" cy="0" r="33" fill="#808080"/>
      <circle cx="0" cy="0" r="17" fill="#505050"/>
      <circle cx="0" cy="0" r="9" fill="#404040"/>
      <circle cx="0" cy="0" r="4" fill="#303030"/>
      
      <!-- Very soft highlight on disc -->
      <ellipse cx="-48" cy="-48" rx="50" ry="32" fill="white" opacity="0.35" transform="rotate(-28 -48 -48)"/>
      <ellipse cx="-32" cy="-32" rx="28" ry="16" fill="white" opacity="0.5" transform="rotate(-28 -32 -32)"/>
      
      <!-- "88" text - dark gray -->
      <text x="92" y="10" 
            font-family="Helvetica Neue, Helvetica, Arial, sans-serif" 
            font-size="46" 
            font-weight="700" 
            fill="#404040" 
            opacity="0.85"
            text-anchor="middle">88</text>
    </g>
    
    <!-- Purple WAXFEED tab -->
    <rect x="342" y="152" width="52" height="96" rx="5" fill="#9370db"/>
    
    <!-- WAXFEED text (vertical) -->
    <text x="368" y="200" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="15" 
          font-weight="700" 
          fill="white" 
          text-anchor="middle" 
          letter-spacing="1.8"
          transform="rotate(90 368 200)">WAXFEED</text>
    
    <!-- Corner screws/indicators -->
    <rect x="22" y="22" width="8" height="8" rx="1" fill="#d0d0d0"/>
    <rect x="370" y="22" width="8" height="8" rx="1" fill="#d0d0d0"/>
    <rect x="22" y="370" width="8" height="8" rx="1" fill="#d0d0d0"/>
    <rect x="370" y="370" width="8" height="8" rx="1" fill="#d0d0d0"/>
  </svg>
</body>
</html>

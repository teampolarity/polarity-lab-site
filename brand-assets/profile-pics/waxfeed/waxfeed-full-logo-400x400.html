<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waxfeed Full Logo - 400x400</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @page { size: 400px 400px; margin: 0; }
    body { 
      width: 400px; 
      height: 400px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: #f5f5f5;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <defs>
      <!-- SUBTLE, PASTEL holographic gradient - very soft -->
      <radialGradient id="holoDisc" cx="30%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="20%" stop-color="#ffe8f5"/>
        <stop offset="35%" stop-color="#ffd9f0"/>
        <stop offset="50%" stop-color="#d9f5e8"/>
        <stop offset="65%" stop-color="#dce8ff"/>
        <stop offset="80%" stop-color="#e8d9ff"/>
        <stop offset="100%" stop-color="#f0e0ff"/>
      </radialGradient>
      
      <!-- Center hub gradient -->
      <radialGradient id="hub" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#e8e8e8"/>
        <stop offset="30%" stop-color="#b8b8b8"/>
        <stop offset="60%" stop-color="#909090"/>
        <stop offset="100%" stop-color="#707070"/>
      </radialGradient>
      
      <!-- Soft shadow -->
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
        <feOffset dx="0" dy="3" result="offsetblur"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.2"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    
    <!-- Light gray container background -->
    <rect x="0" y="0" width="400" height="400" fill="#e8e8e8" rx="8"/>
    
    <!-- Vinyl Disc -->
    <g transform="translate(200, 200)" filter="url(#shadow)">
      <!-- Main SOFT holographic disc surface -->
      <circle cx="0" cy="0" r="165" fill="url(#holoDisc)"/>
      
      <!-- Very subtle grooves -->
      <circle cx="0" cy="0" r="158" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="145" fill="none" stroke="rgba(0,0,0,0.02)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="130" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="115" fill="none" stroke="rgba(0,0,0,0.02)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="85" fill="none" stroke="rgba(0,0,0,0.02)" stroke-width="0.5"/>
      
      <!-- Center hub -->
      <circle cx="0" cy="0" r="50" fill="url(#hub)"/>
      <circle cx="0" cy="0" r="42" fill="#a0a0a0"/>
      <circle cx="0" cy="0" r="35" fill="#888888"/>
      <circle cx="0" cy="0" r="18" fill="#484848"/>
      <circle cx="0" cy="0" r="10" fill="#383838"/>
      <circle cx="0" cy="0" r="5" fill="#282828"/>
      
      <!-- Soft highlight on disc -->
      <ellipse cx="-45" cy="-45" rx="55" ry="35" fill="white" opacity="0.5" transform="rotate(-25 -45 -45)"/>
      <ellipse cx="-30" cy="-30" rx="30" ry="18" fill="white" opacity="0.7" transform="rotate(-25 -30 -30)"/>
      
      <!-- Bold "88" text -->
      <text x="95" y="12" 
            font-family="Helvetica Neue, Helvetica, Arial, sans-serif" 
            font-size="48" 
            font-weight="700" 
            fill="#3a3a3a" 
            text-anchor="middle">88</text>
    </g>
    
    <!-- Purple WAXFEED tab -->
    <rect x="345" y="150" width="55" height="100" rx="6" fill="#9b59b6"/>
    
    <!-- WAXFEED text (vertical) -->
    <text x="372.5" y="200" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="16" 
          font-weight="700" 
          fill="white" 
          text-anchor="middle" 
          letter-spacing="2"
          transform="rotate(90 372.5 200)">WAXFEED</text>
  </svg>
</body>
</html>

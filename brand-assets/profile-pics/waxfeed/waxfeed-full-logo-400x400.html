<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waxfeed Full Logo - 400x400</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @page { size: 400px 400px; margin: 0; }
    body { 
      width: 400px; 
      height: 400px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: #f5f5f5;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <defs>
      <!-- Vibrant holographic gradient - pink to green to blue to purple -->
      <radialGradient id="holoDisc" cx="35%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="20%" stop-color="#ffb3d9"/>
        <stop offset="35%" stop-color="#ff99cc"/>
        <stop offset="50%" stop-color="#99ffcc"/>
        <stop offset="65%" stop-color="#99ccff"/>
        <stop offset="80%" stop-color="#cc99ff"/>
        <stop offset="100%" stop-color="#e6b3ff"/>
      </radialGradient>
      
      <!-- Center hub gradient -->
      <radialGradient id="hub" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#f0f0f0"/>
        <stop offset="30%" stop-color="#c0c0c0"/>
        <stop offset="60%" stop-color="#909090"/>
        <stop offset="100%" stop-color="#606060"/>
      </radialGradient>
      
      <!-- Shadow filter -->
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
        <feOffset dx="0" dy="4" result="offsetblur"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.3"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    
    <!-- Light gray container background -->
    <rect x="0" y="0" width="400" height="400" fill="#e8e8e8" rx="8"/>
    
    <!-- Vinyl Disc -->
    <g transform="translate(200, 200)" filter="url(#shadow)">
      <!-- Main holographic disc surface -->
      <circle cx="0" cy="0" r="165" fill="url(#holoDisc)"/>
      
      <!-- Subtle grooves -->
      <circle cx="0" cy="0" r="158" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <circle cx="0" cy="0" r="145" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
      <circle cx="0" cy="0" r="130" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <circle cx="0" cy="0" r="115" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
      <circle cx="0" cy="0" r="100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <circle cx="0" cy="0" r="85" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
      
      <!-- Center hub -->
      <circle cx="0" cy="0" r="50" fill="url(#hub)"/>
      <circle cx="0" cy="0" r="42" fill="#a0a0a0"/>
      <circle cx="0" cy="0" r="35" fill="#888888"/>
      <circle cx="0" cy="0" r="18" fill="#3c3c3c"/>
      <circle cx="0" cy="0" r="10" fill="#2a2a2a"/>
      <circle cx="0" cy="0" r="5" fill="#1a1a1a"/>
      
      <!-- Bright highlight on disc -->
      <ellipse cx="-50" cy="-50" rx="50" ry="30" fill="white" opacity="0.6" transform="rotate(-30 -50 -50)"/>
      <ellipse cx="-35" cy="-35" rx="25" ry="15" fill="white" opacity="0.8" transform="rotate(-30 -35 -35)"/>
      
      <!-- Bold "88" text -->
      <text x="95" y="12" 
            font-family="Helvetica Neue, Helvetica, Arial, sans-serif" 
            font-size="48" 
            font-weight="700" 
            fill="#2a2a2a" 
            text-anchor="middle">88</text>
    </g>
    
    <!-- Purple WAXFEED tab -->
    <rect x="345" y="150" width="55" height="100" rx="6" fill="#9b59b6"/>
    
    <!-- WAXFEED text (vertical) -->
    <text x="372.5" y="200" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="16" 
          font-weight="700" 
          fill="white" 
          text-anchor="middle" 
          letter-spacing="2"
          transform="rotate(90 372.5 200)">WAXFEED</text>
  </svg>
</body>
</html>

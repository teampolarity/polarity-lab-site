<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waxfeed Full Logo with Tab - 400x400</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @page { size: 400px 400px; margin: 0; }
    body { 
      width: 400px; 
      height: 400px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: #f0f0f0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="400" height="400">
    <defs>
      <!-- Holographic disc gradients -->
      <radialGradient id="holoBase" cx="30%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="15%" stop-color="#ffb8e0"/>
        <stop offset="30%" stop-color="#f0b8d8"/>
        <stop offset="48%" stop-color="#98d8b8"/>
        <stop offset="60%" stop-color="#b8c8ff"/>
        <stop offset="72%" stop-color="#b898d8"/>
        <stop offset="84%" stop-color="#d8a8c8"/>
        <stop offset="100%" stop-color="#e8c8d8"/>
      </radialGradient>
      
      <!-- Hub gradient -->
      <radialGradient id="hubMetal" cx="40%" cy="35%" r="60%">
        <stop offset="0%" stop-color="#f0f0f0"/>
        <stop offset="50%" stop-color="#a0a0a0"/>
        <stop offset="100%" stop-color="#686868"/>
      </radialGradient>
      
      <filter id="discShadow">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.3"/>
      </filter>
    </defs>
    
    <!-- Container frame (light gray) -->
    <rect x="10" y="10" width="400" height="400" rx="8" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="2"/>
    
    <!-- Vinyl Disc -->
    <g transform="translate(210, 210)" filter="url(#discShadow)">
      <!-- Disc surface -->
      <circle cx="0" cy="0" r="160" fill="url(#holoBase)"/>
      
      <!-- Grooves -->
      <circle cx="0" cy="0" r="152" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
      <circle cx="0" cy="0" r="136" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
      <circle cx="0" cy="0" r="120" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
      <circle cx="0" cy="0" r="104" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
      <circle cx="0" cy="0" r="88" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
      
      <!-- Center hub -->
      <circle cx="0" cy="0" r="45" fill="url(#hubMetal)"/>
      <circle cx="0" cy="0" r="38" fill="#a8a8a8"/>
      <circle cx="0" cy="0" r="15" fill="#2c2c2c"/>
      <circle cx="0" cy="0" r="8" fill="#1a1a1a"/>
      
      <!-- Highlight -->
      <ellipse cx="-20" cy="-25" rx="30" ry="15" fill="white" opacity="0.4" transform="rotate(-30 -20 -25)"/>
      
      <!-- "88" text -->
      <text x="70" y="8" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1a1a1a" opacity="0.7" text-anchor="middle">88</text>
    </g>
    
    <!-- Purple tab with WAXFEED text -->
    <g transform="translate(360, 210)">
      <!-- Tab shape -->
      <rect x="0" y="-40" width="50" height="80" rx="4" fill="#9b59b6"/>
      
      <!-- Text on tab (rotated 90 degrees) -->
      <text x="25" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle" transform="rotate(90 25 0)" letter-spacing="1">
        WAXFEED
      </text>
    </g>
    
    <!-- Small indicator icons in corner -->
    <circle cx="30" cy="390" r="6" fill="#c0c0c0"/>
  </svg>
</body>
</html>

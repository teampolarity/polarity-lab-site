<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>POLARITY - LinkedIn Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    .banner {
      width: 1584px;
      height: 396px;
      background: linear-gradient(135deg, #f8f5f7 0%, #fff5f7 30%, #ffe8ec 60%, #fff0f3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Subtle grid pattern */
    .banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(255,68,102,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,68,102,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    /* Glow effects */
    .glow-left {
      position: absolute;
      left: -100px;
      top: 50%;
      transform: translateY(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(187,143,206,0.15) 0%, transparent 70%);
    }
    .glow-right {
      position: absolute;
      right: -100px;
      top: 50%;
      transform: translateY(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(78,205,196,0.15) 0%, transparent 70%);
    }
    .glow-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(255,68,102,0.08) 0%, transparent 60%);
    }
    .content {
      display: flex;
      align-items: center;
      gap: 60px;
      position: relative;
      z-index: 1;
    }
    .logo {
      width: 600px;
      height: auto;
      filter: drop-shadow(0 4px 30px rgba(255,68,102,0.3));
    }
    .tagline {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tagline-main {
      font-size: 24px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .tagline-sub {
      font-size: 16px;
      color: #666;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="glow-left"></div>
    <div class="glow-right"></div>
    <div class="glow-center"></div>
    <div class="content">
      <svg class="logo" viewBox="0 0 820 140">
        <defs>
          <radialGradient id="nodeGrad" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="35%" stop-color="#FF8899"/>
            <stop offset="100%" stop-color="#CC2244"/>
          </radialGradient>
          <radialGradient id="sphereGrad" cx="32%" cy="32%" r="68%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="15%" stop-color="#FFE5E8"/>
            <stop offset="30%" stop-color="#FFB0BB"/>
            <stop offset="50%" stop-color="#FF4466"/>
            <stop offset="75%" stop-color="#CC2244"/>
            <stop offset="90%" stop-color="#991133"/>
            <stop offset="100%" stop-color="#771122"/>
          </radialGradient>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF4466" stop-opacity="0.1"/>
            <stop offset="50%" stop-color="#FFD0DD"/>
            <stop offset="100%" stop-color="#FF4466" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
            <stop offset="30%" stop-color="#FF8899" stop-opacity="0.6"/>
            <stop offset="50%" stop-color="#FF4466" stop-opacity="1"/>
            <stop offset="70%" stop-color="#FF8899" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
          </linearGradient>
          <filter id="letterGlow"><feGaussianBlur stdDeviation="2.5" result="b1"/><feGaussianBlur stdDeviation="5" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="nodeGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="sphereGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="beamGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <g transform="translate(10, 20)"><path d="M 18 100 L 18 8 L 52 8 C 82 8, 82 54, 52 54 L 18 54" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/><circle cx="18" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="18" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="70" cy="31" r="4.5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/></g>
        <g transform="translate(95, 20)"><rect x="48" y="-12" width="8" height="35" rx="4" fill="url(#beamGrad)" filter="url(#beamGlow)"/><rect x="48" y="85" width="8" height="35" rx="4" fill="url(#beamGrad)" filter="url(#beamGlow)"/><ellipse cx="52" cy="54" rx="48" ry="14" transform="rotate(-20 52 54)" stroke="url(#ringGrad)" stroke-width="3" fill="none" filter="url(#letterGlow)"/><ellipse cx="52" cy="54" rx="44" ry="12" transform="rotate(25 52 54)" stroke="url(#ringGrad)" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#letterGlow)"/><circle cx="52" cy="54" r="32" fill="url(#sphereGrad)" filter="url(#sphereGlow)"/><circle cx="40" cy="42" r="10" fill="white" opacity="0.3"/><circle cx="36" cy="38" r="4" fill="white" opacity="0.5"/></g>
        <g transform="translate(205, 20)"><path d="M 18 8 L 18 100 L 72 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/><circle cx="18" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="18" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="72" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/></g>
        <g transform="translate(290, 20)"><path d="M 8 100 L 45 8 L 82 100 M 20 68 L 70 68" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/><circle cx="8" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="45" cy="8" r="6" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="82" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/></g>
        <g transform="translate(385, 20)"><path d="M 18 100 L 18 8 L 52 8 C 82 8, 82 52, 52 52 L 18 52 M 46 52 L 78 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/><circle cx="18" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="18" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="70" cy="30" r="4.5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="78" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/></g>
        <g transform="translate(480, 20)"><path d="M 20 8 L 60 8 M 40 8 L 40 100 M 20 100 L 60 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" fill="none" filter="url(#letterGlow)"/><circle cx="20" cy="8" r="4" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="60" cy="8" r="4" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="40" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="40" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="20" cy="100" r="4" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="60" cy="100" r="4" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/></g>
        <g transform="translate(560, 20)"><path d="M 8 8 L 72 8 M 40 8 L 40 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" fill="none" filter="url(#letterGlow)"/><circle cx="8" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="72" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="40" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="40" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/></g>
        <g transform="translate(650, 20)"><path d="M 8 8 L 42 54 L 76 8 M 42 54 L 42 100" stroke="#FF4466" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#letterGlow)"/><circle cx="8" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="76" cy="8" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="42" cy="54" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/><circle cx="42" cy="100" r="5" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/></g>
      </svg>
      <div class="tagline">
        <span class="tagline-main">Research Lab</span>
        <span class="tagline-sub">Conversational Connectomics</span>
      </div>
    </div>
  </div>
</body>
</html>

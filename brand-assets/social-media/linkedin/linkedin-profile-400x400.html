<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>POLARITY - LinkedIn Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      height: 400px;
      overflow: hidden;
    }
    .profile {
      width: 400px;
      height: 400px;
      background: linear-gradient(145deg, #fff8f9 0%, #ffe8ec 50%, #ffd8df 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,68,102,0.15) 0%, transparent 60%);
    }
    .icon {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 8px 40px rgba(255,68,102,0.4));
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="profile">
    <div class="glow"></div>
    <svg class="icon" viewBox="0 0 120 140">
      <defs>
        <radialGradient id="sphereGrad" cx="32%" cy="32%" r="68%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="15%" stop-color="#FFE5E8"/>
          <stop offset="30%" stop-color="#FFB0BB"/>
          <stop offset="50%" stop-color="#FF4466"/>
          <stop offset="75%" stop-color="#CC2244"/>
          <stop offset="90%" stop-color="#991133"/>
          <stop offset="100%" stop-color="#771122"/>
        </radialGradient>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#FF4466" stop-opacity="0.1"/>
          <stop offset="50%" stop-color="#FFD0DD"/>
          <stop offset="100%" stop-color="#FF4466" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
          <stop offset="30%" stop-color="#FF8899" stop-opacity="0.6"/>
          <stop offset="50%" stop-color="#FF4466" stop-opacity="1"/>
          <stop offset="70%" stop-color="#FF8899" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="sphereGlow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g transform="translate(8, 0)">
        <rect x="48" y="2" width="8" height="30" rx="4" fill="url(#beamGrad)" filter="url(#glow)"/>
        <rect x="48" y="108" width="8" height="30" rx="4" fill="url(#beamGrad)" filter="url(#glow)"/>
        <ellipse cx="52" cy="70" rx="48" ry="14" transform="rotate(-20 52 70)" stroke="url(#ringGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
        <ellipse cx="52" cy="70" rx="44" ry="12" transform="rotate(25 52 70)" stroke="url(#ringGrad)" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#glow)"/>
        <circle cx="52" cy="70" r="38" fill="url(#sphereGrad)" filter="url(#sphereGlow)"/>
        <circle cx="38" cy="56" r="12" fill="white" opacity="0.3"/>
        <circle cx="33" cy="50" r="5" fill="white" opacity="0.5"/>
      </g>
    </svg>
  </div>
</body>
</html>

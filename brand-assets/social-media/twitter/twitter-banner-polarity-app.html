<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Polarity App - Twitter Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1500px; 
      height: 500px; 
      background: linear-gradient(135deg, #0a1a1a 0%, #0f2d2d 50%, #0a1a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }
    
    /* Animated particles background */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, rgba(32, 178, 170, 0.8), rgba(32, 178, 170, 0));
      border-radius: 50%;
      animation: float 20s infinite;
    }
    
    .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 30%; top: 60%; animation-delay: 2s; background: radial-gradient(circle, rgba(126, 238, 230, 0.8), rgba(126, 238, 230, 0)); }
    .particle:nth-child(3) { left: 50%; top: 30%; animation-delay: 4s; }
    .particle:nth-child(4) { left: 70%; top: 70%; animation-delay: 6s; background: radial-gradient(circle, rgba(78, 221, 212, 0.8), rgba(78, 221, 212, 0)); }
    .particle:nth-child(5) { left: 85%; top: 40%; animation-delay: 8s; }
    .particle:nth-child(6) { left: 20%; top: 80%; animation-delay: 10s; }
    .particle:nth-child(7) { left: 60%; top: 15%; animation-delay: 12s; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); opacity: 0.3; }
      50% { transform: translateY(-30px); opacity: 0.8; }
    }
    
    /* Network lines */
    .network-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(32, 178, 170, 0.3), transparent);
      animation: pulse 3s infinite;
    }
    
    .network-line:nth-child(1) { top: 30%; left: 5%; width: 40%; animation-delay: 0s; }
    .network-line:nth-child(2) { top: 60%; right: 10%; width: 35%; animation-delay: 1s; }
    .network-line:nth-child(3) { top: 45%; left: 15%; width: 50%; animation-delay: 2s; }
    .network-line:nth-child(4) { top: 75%; left: 30%; width: 30%; animation-delay: 3s; }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }
    
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 1300px;
    }
    
    .wordmark {
      font-size: 100px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #7EEEE6 0%, #4EDDD4 30%, #20B2AA 60%, #009B99 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 15px rgba(32, 178, 170, 0.6));
    }
    
    .tagline {
      font-size: 28px;
      color: rgba(126, 238, 230, 0.9);
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    
    /* Sphere accent */
    .sphere {
      position: absolute;
      right: 100px;
      top: 50%;
      transform: translateY(-50%);
      width: 180px;
      height: 180px;
    }
    
    .sphere-orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #7EEEE6, #4EDDD4 30%, #20B2AA 50%, #009B99 75%, #005555);
      box-shadow: 0 10px 50px rgba(32, 178, 170, 0.7);
      position: relative;
    }
    
    .sphere-ring {
      position: absolute;
      width: 180%;
      height: 60%;
      border: 3px solid rgba(32, 178, 170, 0.5);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-20deg);
    }
    
    .sphere-highlight {
      position: absolute;
      width: 50px;
      height: 40px;
      background: radial-gradient(ellipse, rgba(255, 255, 255, 0.6), transparent);
      top: 25%;
      left: 25%;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="network-line"></div>
    <div class="network-line"></div>
    <div class="network-line"></div>
    <div class="network-line"></div>
  </div>
  
  <div class="content">
    <div class="wordmark">POLARITY</div>
    <div class="tagline">Map your mind through conversation</div>
  </div>
  
  <div class="sphere">
    <div class="sphere-orb">
      <div class="sphere-ring"></div>
      <div class="sphere-highlight"></div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARITY Font System - TEST</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #080808;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 1;
            padding: 50px 30px;
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 16px;
            color: #444;
            letter-spacing: 10px;
            margin-bottom: 30px;
        }
        .test-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 50px;
        }
        .test-display svg { width: 160px; height: 160px; }
        .section-title {
            color: #FF4466;
            font-size: 12px;
            letter-spacing: 8px;
            text-align: center;
            margin: 50px 0 20px;
            text-shadow: 0 0 20px rgba(255,68,102,0.5);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
        }
        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .cell svg { width: 110px; height: 110px; }
        .label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 10px;
            letter-spacing: 2px;
        }
        .footer {
            text-align: center;
            color: #333;
            margin-top: 60px;
            padding: 30px;
            border-top: 1px solid #1a1a1a;
            font-size: 10px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    
    <svg width="0" height="0">
        <defs>
            <radialGradient id="node" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#FFF"/>
                <stop offset="40%" stop-color="#FF7788"/>
                <stop offset="100%" stop-color="#DD3355"/>
            </radialGradient>
            <filter id="glow">
                <feGaussianBlur stdDeviation="2.5" result="b1"/>
                <feGaussianBlur stdDeviation="5" result="b2"/>
                <feMerge>
                    <feMergeNode in="b2"/>
                    <feMergeNode in="b1"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            <filter id="glow2">
                <feGaussianBlur stdDeviation="3" result="b"/>
                <feMerge>
                    <feMergeNode in="b"/>
                    <feMergeNode in="b"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            <linearGradient id="ring" x1="0%" y1="0%" x2="100%">
                <stop offset="0%" stop-color="#FF4466" stop-opacity="0.2"/>
                <stop offset="50%" stop-color="#FFAACC"/>
                <stop offset="100%" stop-color="#FF4466" stop-opacity="0.2"/>
            </linearGradient>
        </defs>
    </svg>

    <script>
        const c = document.getElementById('particles');
        const x = c.getContext('2d');
        let p = [];
        function resize() { c.width = innerWidth; c.height = innerHeight; }
        function init() {
            p = [];
            for (let i = 0; i < 80; i++) {
                p.push({
                    x: Math.random() * c.width,
                    y: Math.random() * c.height,
                    s: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 0.15,
                    vy: (Math.random() - 0.5) * 0.15,
                    o: Math.random() * 0.3 + 0.1,
                    h: Math.random() * 40 + 35
                });
            }
        }
        function draw() {
            x.clearRect(0, 0, c.width, c.height);
            p.forEach(pt => {
                pt.x += pt.vx; pt.y += pt.vy;
                if (pt.x < 0) pt.x = c.width;
                if (pt.x > c.width) pt.x = 0;
                if (pt.y < 0) pt.y = c.height;
                if (pt.y > c.height) pt.y = 0;
                x.beginPath();
                x.arc(pt.x, pt.y, pt.s * 2, 0, Math.PI * 2);
                x.fillStyle = `hsla(${pt.h},60%,50%,${pt.o * 0.12})`;
                x.fill();
                x.beginPath();
                x.arc(pt.x, pt.y, pt.s, 0, Math.PI * 2);
                x.fillStyle = `hsla(${pt.h},70%,60%,${pt.o})`;
                x.fill();
            });
            requestAnimationFrame(draw);
        }
        resize(); init(); draw();
        addEventListener('resize', () => { resize(); init(); });
    </script>

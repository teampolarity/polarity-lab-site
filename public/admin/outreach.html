<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outreach — Lab OS</title>
  <link rel="icon" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('lab_os_theme') || 'dark')</script>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-logo">LAB OS</div>
    <div class="sidebar-label">Overview</div>
    <a href="/admin/dashboard.html" class="sidebar-link">Dashboard</a>
    <div class="sidebar-label" style="margin-top:16px">Pipeline</div>
    <a href="/admin/grants.html" class="sidebar-link">Grants</a>
    <a href="/admin/outreach.html" class="sidebar-link active">Outreach</a>
    <a href="/admin/believers.html" class="sidebar-link">Believers</a>
    <div class="sidebar-label" style="margin-top:16px">Growth</div>
    <a href="/admin/content.html" class="sidebar-link">Content</a>
    <a href="/admin/docs.html" class="sidebar-link">Docs</a>
    <div class="sidebar-label" style="margin-top:24px">Account</div>
    <button class="theme-toggle" id="theme-toggle"><!-- icon injected by auth.js --></button>
    <a href="#" class="sidebar-link" id="logout-btn">Sign out</a>
  </nav>
  <main class="main">
    <div class="topbar">
      <div>
        <h1 class="page-title">Outreach</h1>
        <p class="page-sub">Manage leads and draft cold emails.</p>
      </div>
      <button class="add-btn" id="add-btn">+ Add Lead</button>
    </div>
    <div class="pipeline" id="pipeline"></div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h2 class="modal-title" id="modal-title">Add Lead</h2>
    <div class="field"><label>Name *</label><input id="f-name" placeholder="Dr. Sarah Chen"></div>
    <div class="field"><label>Organization</label><input id="f-org" placeholder="UCSF Medical Center"></div>
    <div class="field"><label>Role</label><input id="f-role" placeholder="Chief AI Officer"></div>
    <div class="field"><label>Email</label><input id="f-email" type="email" placeholder="schen@ucsf.edu"></div>
    <div class="field"><label>Project *</label>
      <select id="f-project">
        <option value="Integrity Delta">Integrity Delta</option>
        <option value="PolarityGPS">PolarityGPS</option>
        <option value="AVDP">AVDP</option>
        <option value="WAXFEED">WAXFEED</option>
        <option value="General Fund">General Fund</option>
      </select>
    </div>
    <div class="field"><label>Source</label><input id="f-source" placeholder="LinkedIn, cold, referral..."></div>
    <div class="field"><label>Stage</label>
      <select id="f-stage">
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="replied">Replied</option>
        <option value="in_conversation">In Conversation</option>
        <option value="won">Won</option>
        <option value="lost">Lost</option>
      </select>
    </div>
    <div class="field"><label>Last Contact</label><input id="f-last-contact" type="date"></div>
    <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Any relevant context..."></textarea></div>
    <div class="modal-footer">
      <button class="btn-sm btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn-sm btn-primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<!-- Draft Email Modal -->
<div class="modal-overlay" id="draft-modal" style="display:none">
  <div class="modal">
    <h2 class="modal-title">Draft Cold Email</h2>
    <div class="field"><label>Extra context (optional)</label>
      <textarea id="d-context" placeholder="E.g. They recently published a paper on AI safety in radiology..."></textarea>
    </div>
    <button class="btn-sm btn-primary" id="d-generate">Generate</button>
    <div class="draft-box" id="d-output" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn-sm btn-ghost" id="draft-close">Close</button>
    </div>
  </div>
</div>

<script src="/admin/js/auth.js"></script>
<script>
  requireAuth();
  document.getElementById('logout-btn').addEventListener('click', () => { clearToken(); window.location.href = '/admin/index.html'; });

  const STAGES = ['new','contacted','replied','in_conversation','won','lost'];
  const STAGE_LABELS = {new:'New',contacted:'Contacted',replied:'Replied',in_conversation:'In Conversation',won:'Won',lost:'Lost'};
  let leads = [];
  let editingId = null;
  let draftLeadId = null;

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function load() {
    leads = await apiGet('/api/lab-os/leads') || [];
    render();
  }

  function render() {
    const pipeline = document.getElementById('pipeline');
    pipeline.innerHTML = STAGES.map(stage => {
      const items = leads.filter(l => l.stage === stage);
      return `<div class="pipeline-col">
        <div class="pipeline-col-header">
          <span>${STAGE_LABELS[stage]}</span>
          <span class="pipeline-col-count">${items.length}</span>
        </div>
        ${items.map(l => `
          <div class="card" onclick="openEdit(${l.id})">
            <div class="card-title">${esc(l.name)}</div>
            <div class="card-sub">${esc(l.organization || '')}${l.role ? ' · ' + esc(l.role) : ''}</div>
            <span class="badge badge-coral" style="margin-top:8px;display:inline-block">${esc(l.project)}</span>
            <div style="margin-top:10px">
              <button class="btn-sm btn-ghost" style="font-size:11px;padding:4px 10px" onclick="event.stopPropagation();openDraft(${l.id})">Draft email</button>
            </div>
          </div>`).join('')}
      </div>`;
    }).join('');
  }

  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add Lead';
    ['name','org','role','email','source','notes'].forEach(f => { const el = document.getElementById(`f-${f}`); if (el) el.value = ''; });
    document.getElementById('f-project').value = 'Integrity Delta';
    document.getElementById('f-stage').value = 'new';
    document.getElementById('f-last-contact').value = '';
    document.getElementById('modal').style.display = 'flex';
  }

  function openEdit(id) {
    const l = leads.find(x => x.id === id);
    if (!l) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Lead';
    document.getElementById('f-name').value = l.name || '';
    document.getElementById('f-org').value = l.organization || '';
    document.getElementById('f-role').value = l.role || '';
    document.getElementById('f-email').value = l.email || '';
    document.getElementById('f-project').value = l.project || 'Integrity Delta';
    document.getElementById('f-source').value = l.source || '';
    document.getElementById('f-stage').value = l.stage || 'new';
    document.getElementById('f-last-contact').value = l.last_contact ? l.last_contact.slice(0,10) : '';
    document.getElementById('f-notes').value = l.notes || '';
    document.getElementById('modal').style.display = 'flex';
  }

  async function saveLead() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Name is required.'); return; }
    const body = {
      name,
      organization: document.getElementById('f-org').value.trim() || null,
      role: document.getElementById('f-role').value.trim() || null,
      email: document.getElementById('f-email').value.trim() || null,
      project: document.getElementById('f-project').value,
      source: document.getElementById('f-source').value.trim() || null,
      stage: document.getElementById('f-stage').value,
      last_contact: document.getElementById('f-last-contact').value || null,
      notes: document.getElementById('f-notes').value.trim() || null,
    };
    if (editingId) {
      await apiPut(`/api/lab-os/leads/${editingId}`, body);
    } else {
      await apiPost('/api/lab-os/leads', body);
    }
    document.getElementById('modal').style.display = 'none';
    await load();
  }

  function openDraft(id) {
    draftLeadId = id;
    document.getElementById('d-context').value = '';
    document.getElementById('d-output').style.display = 'none';
    document.getElementById('d-output').textContent = '';
    document.getElementById('d-generate').textContent = 'Generate';
    document.getElementById('d-generate').disabled = false;
    document.getElementById('draft-modal').style.display = 'flex';
  }

  async function generateEmail() {
    const btn = document.getElementById('d-generate');
    btn.textContent = 'Generating...';
    btn.disabled = true;
    const data = await apiPost('/api/lab-os/generate/outreach-email', {
      lead_id: draftLeadId,
      context: document.getElementById('d-context').value.trim() || null
    });
    const out = document.getElementById('d-output');
    out.textContent = data?.draft || 'Error generating draft.';
    out.style.display = 'block';
    btn.textContent = 'Regenerate';
    btn.disabled = false;
  }

  document.getElementById('add-btn').addEventListener('click', openAdd);
  document.getElementById('modal-cancel').addEventListener('click', () => document.getElementById('modal').style.display = 'none');
  document.getElementById('modal-save').addEventListener('click', saveLead);
  document.getElementById('d-generate').addEventListener('click', generateEmail);
  document.getElementById('draft-close').addEventListener('click', () => document.getElementById('draft-modal').style.display = 'none');

  load();
</script>
</body>
</html>

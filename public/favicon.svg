<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#F5F5F5"/>
  
  <!-- Main sphere gradient -->
  <defs>
    <radialGradient id="sphereGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FF8A9B"/>
      <stop offset="40%" stop-color="#E85A71"/>
      <stop offset="100%" stop-color="#C94058"/>
    </radialGradient>
    <radialGradient id="highlight" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Orbital ring behind -->
  <ellipse cx="50" cy="50" rx="42" ry="12" fill="none" stroke="#E8A0A8" stroke-width="2" transform="rotate(-20 50 50)" opacity="0.6"/>
  
  <!-- Main sphere -->
  <circle cx="50" cy="50" r="32" fill="url(#sphereGrad)"/>
  
  <!-- Sphere highlight -->
  <circle cx="50" cy="50" r="32" fill="url(#highlight)"/>
  
  <!-- Small highlight dot -->
  <circle cx="38" cy="38" r="8" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Orbital ring in front -->
  <ellipse cx="50" cy="50" rx="42" ry="12" fill="none" stroke="#E8A0A8" stroke-width="2" transform="rotate(-20 50 50)" opacity="0.8" stroke-dasharray="70 62"/>
</svg>

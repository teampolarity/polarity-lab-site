<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #020204;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* subtle radial glow behind content */
  body::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(78,205,196,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .wordmark {
    position: absolute;
    top: 48px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .atom {
    width: 28px;
    height: 28px;
  }

  .wordmark-text {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }

  .content {
    text-align: center;
    padding: 0 80px;
    position: relative;
    z-index: 1;
  }

  .headline {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.12;
    color: #ffffff;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }

  .headline em {
    font-style: normal;
    color: #4ECDC4;
  }

  .body {
    font-size: 18px;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    max-width: 640px;
    margin: 0 auto;
  }

  .domain {
    position: absolute;
    bottom: 48px;
    right: 60px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.05em;
  }

  .tag {
    position: absolute;
    bottom: 52px;
    left: 60px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(78,205,196,0.5);
    border: 1px solid rgba(78,205,196,0.2);
    padding: 5px 12px;
    border-radius: 2px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="wordmark">
    <svg class="atom" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="g" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#6EE7DF"/>
          <stop offset="50%" stop-color="#4ECDC4"/>
          <stop offset="100%" stop-color="#2BA89F"/>
        </radialGradient>
      </defs>
      <circle cx="50" cy="50" r="10" fill="url(#g)"/>
      <ellipse cx="50" cy="50" rx="40" ry="16" fill="none" stroke="url(#g)" stroke-width="2.5" opacity="0.7"/>
      <ellipse cx="50" cy="50" rx="40" ry="16" fill="none" stroke="url(#g)" stroke-width="2.5" opacity="0.7" transform="rotate(60 50 50)"/>
      <ellipse cx="50" cy="50" rx="40" ry="16" fill="none" stroke="url(#g)" stroke-width="2.5" opacity="0.7" transform="rotate(120 50 50)"/>
    </svg>
    <span class="wordmark-text">Polarity Lab</span>
  </div>

  <div class="content">
    <h1 class="headline">Every platform you use<br>has a <em>model of you.</em></h1>
    <p class="body">The gap between that model and the person<br>is measurable. We measure it.</p>
  </div>

  <div class="tag">Counter-environments for authentic capacity</div>
  <div class="domain">polarity-lab.com</div>

</body>
</html>

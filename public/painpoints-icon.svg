<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="rodGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#e63329"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="40%" stop-color="#e63329"/>
      <stop offset="100%" stop-color="#e63329" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Globe wireframe -->
  <g stroke="#666" stroke-width="1" fill="none" opacity="0.6">
    <!-- Main sphere outline -->
    <circle cx="100" cy="100" r="55"/>
    <!-- Latitude lines -->
    <ellipse cx="100" cy="100" rx="55" ry="18"/>
    <ellipse cx="100" cy="100" rx="55" ry="38"/>
    <ellipse cx="100" cy="82" rx="48" ry="12"/>
    <ellipse cx="100" cy="118" rx="48" ry="12"/>
    <!-- Longitude lines -->
    <ellipse cx="100" cy="100" rx="18" ry="55"/>
    <ellipse cx="100" cy="100" rx="38" ry="55"/>
  </g>

  <!-- Globe highlight -->
  <path d="M68 72 Q58 82 62 94" stroke="#999" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Red rod with glow -->
  <g filter="url(#glow)">
    <line x1="28" y1="172" x2="172" y2="28" stroke="url(#rodGlow)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Rod core (brighter) -->
  <line x1="28" y1="172" x2="172" y2="28" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- Glowing nodes along rod -->
  <!-- Bottom node -->
  <circle cx="35" cy="165" r="10" fill="#e63329" opacity="0.3"/>
  <circle cx="35" cy="165" r="6" fill="#e63329" opacity="0.6"/>
  <circle cx="35" cy="165" r="3" fill="#ff6b6b"/>

  <!-- Lower-mid node -->
  <circle cx="58" cy="142" r="8" fill="#e63329" opacity="0.3"/>
  <circle cx="58" cy="142" r="5" fill="#e63329" opacity="0.6"/>
  <circle cx="58" cy="142" r="2.5" fill="#ff6b6b"/>

  <!-- Center node (largest, on globe) -->
  <circle cx="100" cy="100" r="16" fill="#e63329" opacity="0.25"/>
  <circle cx="100" cy="100" r="10" fill="#e63329" opacity="0.5"/>
  <circle cx="100" cy="100" r="5" fill="#ff6b6b"/>

  <!-- Upper-mid node -->
  <circle cx="142" cy="58" r="8" fill="#e63329" opacity="0.3"/>
  <circle cx="142" cy="58" r="5" fill="#e63329" opacity="0.6"/>
  <circle cx="142" cy="58" r="2.5" fill="#ff6b6b"/>

  <!-- Top node -->
  <circle cx="165" cy="35" r="10" fill="#e63329" opacity="0.3"/>
  <circle cx="165" cy="35" r="6" fill="#e63329" opacity="0.6"/>
  <circle cx="165" cy="35" r="3" fill="#ff6b6b"/>

  <!-- Small satellite nodes -->
  <circle cx="75" cy="125" r="5" fill="#e63329" opacity="0.3"/>
  <circle cx="75" cy="125" r="3" fill="#e63329" opacity="0.6"/>
  <circle cx="75" cy="125" r="1.5" fill="#ff6b6b"/>

  <circle cx="125" cy="75" r="5" fill="#e63329" opacity="0.3"/>
  <circle cx="125" cy="75" r="3" fill="#e63329" opacity="0.6"/>
  <circle cx="125" cy="75" r="1.5" fill="#ff6b6b"/>

  <!-- Wire tendril at bottom -->
  <path d="M35 165 Q22 178 18 185 Q14 192 22 196" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
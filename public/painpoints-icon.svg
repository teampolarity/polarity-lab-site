<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ppBaseGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="60%" stop-color="#120505"/>
      <stop offset="100%" stop-color="#0d0303"/>
    </radialGradient>
    <radialGradient id="ppAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E63329" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E63329" stop-opacity="0"/>
    </radialGradient>
    <filter id="ppGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ppRingGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="ppClip">
      <circle cx="100" cy="100" r="82"/>
    </clipPath>
  </defs>
  <!-- Ambient glow -->
  <circle cx="100" cy="100" r="95" fill="url(#ppAmbient)"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#E63329" stroke-width="1.5" opacity="0.3" filter="url(#ppRingGlow)"/>
  <!-- Main disc -->
  <circle cx="100" cy="100" r="82" fill="url(#ppBaseGrad)"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#E63329" stroke-width="0.5" opacity="0.2"/>

  <g clip-path="url(#ppClip)">
    <!-- Globe wireframe -->
    <circle cx="104" cy="104" r="36" stroke="#FAFAFA" stroke-width="1.5" fill="none" opacity="0.35"/>
    <ellipse cx="104" cy="104" rx="36" ry="13" stroke="#FAFAFA" stroke-width="0.8" fill="none" opacity="0.25"/>
    <ellipse cx="104" cy="104" rx="13" ry="36" stroke="#FAFAFA" stroke-width="0.8" fill="none" opacity="0.25"/>

    <!-- Needle piercing through with glow -->
    <line x1="42" y1="158" x2="138" y2="58" stroke="#E63329" stroke-width="5.5" stroke-linecap="round" filter="url(#ppGlow)"/>
    <!-- Needle tip -->
    <line x1="138" y1="58" x2="158" y2="38" stroke="#E63329" stroke-width="4" stroke-linecap="round" filter="url(#ppGlow)"/>

    <!-- Entry/exit points -->
    <circle cx="78" cy="130" r="5" fill="#E63329" filter="url(#ppGlow)"/>
    <circle cx="132" cy="68" r="4" fill="#E63329" filter="url(#ppGlow)"/>

    <!-- Grip lines -->
    <line x1="50" y1="150" x2="56" y2="156" stroke="#FAFAFA" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="58" y1="142" x2="64" y2="148" stroke="#FAFAFA" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- Glossy highlight -->
  <ellipse cx="80" cy="72" rx="40" ry="25" fill="white" opacity="0.04"/>
</svg>
